name: Deploy Astro to GitHub Pages

on:
    push:
        branches:
            - main # Change to 'master' if that's your default branch
    workflow_dispatch: # Allows manual triggering from the Actions tab

# Allow only one concurrent deployment
concurrency:
    group: pages
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm # Change to 'yarn' or 'pnpm' if you use those

            - name: Install dependencies
              run: npm ci # Change to 'yarn install --frozen-lockfile' or 'pnpm install' if needed

            - name: Set up GitHub Pages
              id: pages
              uses: actions/configure-pages@v5

            - name: Build Astro site
              run: npm run build # Change if your build script is different
              env:
                  SITE: ${{ steps.pages.outputs.origin }}
                  BASE_PATH: ${{ steps.pages.outputs.base_path }}

            - name: Upload build artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist # Astro's default output directory

    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
